<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <!--
    Seamless tile: прозрачный фон (цвет берём из CSS),
    крупные "неоновые" иконки с большим отступом от краёв (чтобы на зуме не появлялись швы).
  -->
  <defs>
    <style><![CDATA[
      .lbl{font-family:system-ui,-apple-system,"Segoe UI","Roboto",sans-serif;font-size:8px;font-weight:200;letter-spacing:.14em;text-anchor:middle}
    ]]></style>
  </defs>

  <g fill="none" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" opacity="0.62">
    <!-- bottle symbol -->
    <g id="b">
      <!-- более реалистичная форма: плечи + шея, без "странного горлышка" -->
      <path d="M16 0 h8 q2 0 2 2 v10 q0 4 4 10 l2 3 q3 5 3 12 v54 q0 10-12 10 h-8 q-12 0-12-10 v-54 q0-7 3-12 l2-3 q4-6 4-10 v-10 q0-2 2-2z"/>
      <path d="M6 44 h26" opacity=".55"/>
      <path d="M6 54 h26" opacity=".35"/>
      <rect x="8" y="60" width="22" height="22" rx="4" opacity=".35"/>
    </g>

    <!-- Layout (denser, still away from edges) -->
    <g transform="translate(64,40) rotate(-10)" stroke="#00F5FF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#00F5FF" opacity=".9">VODKA</text></g>
    <g transform="translate(160,30) rotate(8)" stroke="#FFB000"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FFB000" opacity=".9">COGNAC</text></g>
    <g transform="translate(256,46) rotate(-6)" stroke="#FF2BD6"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF2BD6" opacity=".9">MARTINI</text></g>
    <g transform="translate(352,28) rotate(12)" stroke="#C8FF00"><use href="#b"/><text class="lbl" x="14" y="112" fill="#C8FF00" opacity=".9">GIN</text></g>
    <g transform="translate(448,52) rotate(-12)" stroke="#FFE600"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FFE600" opacity=".9">WHISKY</text></g>
    <g transform="translate(544,34) rotate(10)" stroke="#00BFFF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#00BFFF" opacity=".9">SAKE</text></g>
    <g transform="translate(636,50) rotate(-8)" stroke="#FF7A00"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF7A00" opacity=".9">APEROL</text></g>

    <g transform="translate(92,170) rotate(9)" stroke="#8A5CFF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#8A5CFF" opacity=".9">PORT</text></g>
    <g transform="translate(198,186) rotate(-14)" stroke="#FF3131"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF3131" opacity=".9">RUM</text></g>
    <g transform="translate(304,168) rotate(6)" stroke="#00FFAA"><use href="#b"/><text class="lbl" x="14" y="112" fill="#00FFAA" opacity=".9">TEQUILA</text></g>
    <g transform="translate(410,190) rotate(-8)" stroke="#DDFF00"><use href="#b"/><text class="lbl" x="14" y="112" fill="#DDFF00" opacity=".9">MEZCAL</text></g>
    <g transform="translate(516,176) rotate(10)" stroke="#FF1493"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF1493" opacity=".9">ROSE</text></g>
    <g transform="translate(622,174) rotate(-10)" stroke="#BF40FF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#BF40FF" opacity=".9">VERMOUTH</text></g>

    <g transform="translate(60,304) rotate(-12)" stroke="#FF6600"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF6600" opacity=".9">BOURBON</text></g>
    <g transform="translate(170,290) rotate(8)" stroke="#00D4FF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#00D4FF" opacity=".9">ARAK</text></g>
    <g transform="translate(280,308) rotate(-6)" stroke="#CC00FF"><use href="#b"/><text class="lbl" x="14" y="112" fill="#CC00FF" opacity=".9">PORT</text></g>
    <g transform="translate(390,292) rotate(12)" stroke="#39FF14"><use href="#b"/><text class="lbl" x="14" y="112" fill="#39FF14" opacity=".9">ABSINTHE</text></g>
    <g transform="translate(500,310) rotate(-10)" stroke="#FF0088"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FF0088" opacity=".9">RUM</text></g>
    <g transform="translate(610,294) rotate(9)" stroke="#FFCC00"><use href="#b"/><text class="lbl" x="14" y="112" fill="#FFCC00" opacity=".9">ARMAGNAC</text></g>
  </g>
</svg>
