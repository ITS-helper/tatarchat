services:
  postgres:
    image: postgres:15-alpine
    container_name: tatarchat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tatarchat-db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tatarchat-db"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
